name: ci

# On every PR: type + i18n-parity check, build, and the Playwright E2E/visual/a11y
# suite on the official pinned container; then (only if Vercel secrets are present)
# a preview deploy whose provisional URL is posted back to the PR for validation.
# Production is NOT deployed here — that is gated on release-please (release-please.yml).

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Type-check, i18n parity and build on Node 24.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  # E2E + SEO + a11y + computed-style on the pinned Playwright container so the
  # baselines/render are deterministic (plan §5.4). Runs before any preview deploy.
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Vercel preview deploy — the provisional URL for validation (RN-15). Gated on
  # verify + e2e, and skipped when Vercel secrets are not yet configured.
  preview:
    needs: [verify, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Check Vercel secrets
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: echo "ready=${{ secrets.VERCEL_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - name: Deploy preview to Vercel
        id: deploy
        if: ${{ steps.guard.outputs.ready == 'true' }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          npx vercel build --token="$VERCEL_TOKEN"
          url=$(npx vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Post preview URL to job summary
        if: ${{ steps.guard.outputs.ready == 'true' && steps.deploy.outputs.url != '' }}
        run: |
          echo "## Vercel Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "[${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})" >> "$GITHUB_STEP_SUMMARY"
      - name: Comment preview URL
        if: ${{ steps.guard.outputs.ready == 'true' && steps.deploy.outputs.url != '' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const body = `🔎 **Vercel preview** (provisional URL for validation):\n\n${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const mark = '🔎 **Vercel preview**';
            const existing = comments.find((c) => c.body && c.body.startsWith(mark));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
