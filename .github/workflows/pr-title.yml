name: pr-title

# Ensures the PR title is a valid Conventional Commit. With squash merge the PR
# title becomes the commit on main, which is what release-please parses to decide
# the next version. Keep this green to keep versioning correct.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — keep in sync with the project's Conventional Commits usage.
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
